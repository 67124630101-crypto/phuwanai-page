<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อด้วย GPS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="styles/attendance.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🗺️ ระบบเช็คชื่อด้วย GPS</h1>
            <p class="subtitle">ตรวจสอบตำแหน่งและเช็คชื่อในเวลาจริง</p>
        </header>

        <main class="main-content">
            <!-- ส่วนข้อมูลผู้ใช้ -->
            <section class="user-info card">
                <h2>ข้อมูลส่วนตัว</h2>
                <div class="form-group">
                    <label for="employeeId">หมายเลขพนักงาน / รหัสนักเรียน:</label>
                    <input type="text" id="employeeId" placeholder="เช่น 001, EMP123">
                </div>
                <div class="form-group">
                    <label for="employeeName">ชื่อ-นามสกุล:</label>
                    <input type="text" id="employeeName" placeholder="เช่น ภูวไนย แก้วทุม">
                </div>
                <div class="form-group">
                    <label for="department">แผนก / ชั้นเรียน:</label>
                    <input type="text" id="department" placeholder="เช่น IT / ชั้น 4/1">
                </div>
            </section>

            <!-- ส่วนแสดง GPS Location -->
            <section class="location-info card">
                <h2>📍 ตำแหน่ง GPS</h2>
                <div id="map" class="map-container"></div>
                <div class="location-details">
                    <p><strong>ละติจูด:</strong> <span id="latitude">-</span></p>
                    <p><strong>ลองจิจูด:</strong> <span id="longitude">-</span></p>
                    <p><strong>ความแม่นยำ:</strong> <span id="accuracy">-</span> เมตร</p>
                    <p><strong>เวลา:</strong> <span id="timestamp">-</span></p>
                </div>
                <div class="button-group">
                    <button id="getLocationBtn" class="btn btn-primary">📍 รับตำแหน่ง GPS</button>
                    <button id="refreshLocationBtn" class="btn btn-secondary">🔄 รีเฟรช</button>
                </div>
            </section>

            <!-- ส่วนเช็คชื่อ -->
            <section class="checkin-section card">
                <h2>✅ เช็คชื่อ</h2>
                <div class="status-message" id="statusMessage">
                    <p>รอการตรวจสอบตำแหน่ง...</p>
                </div>
                <div class="button-group">
                    <button id="checkInBtn" class="btn btn-success" disabled>
                        ✅ เข้างาน
                    </button>
                    <button id="checkOutBtn" class="btn btn-danger" disabled>
                        ❌ ออกงาน
                    </button>
                </div>
            </section>

            <!-- ประวัติการเช็คชื่อ -->
            <section class="history-section card">
                <h2>📋 ประวัติการเช็คชื่อ</h2>
                <div id="historyList" class="history-list">
                    <p class="empty-message">ยังไม่มีประวัติการเช็คชื่อ</p>
                </div>
                <button id="clearHistoryBtn" class="btn btn-warning">🗑️ ล้างประวัติ</button>
            </section>
        </main>

        <footer class="footer">
            <p>© 2024 ระบบเช็คชื่อด้วย GPS | v1.0</p>
        </footer>
    </div>

    <!-- Leaflet Map Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <!-- Application Script -->
    <script src="js/attendance.js"></script>
</body>
</html>
